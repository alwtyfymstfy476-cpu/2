            { id:18, text:"neck lymphatic system", options:[{letter:"a",text:"retropharyngeal lymph nodes involute after age 5 years"},{letter:"b",text:"submandibular lymph nodes receive lymph from nose"},{letter:"c",text:"deep lymph nodes called jugular group"},{letter:"d",text:"all of above true"},{letter:"e",text:"none of the above"}], answer:"d" },

            { id:22, text:"oral cavity", options:[{letter:"a",text:"sensory nerve supply of it for larger proportion mediated by mandibular division of trigeminal nerve"},{letter:"b",text:"tongue muscles mainly supplied by facial artery"},{letter:"c",text:"foramen cecum play significant role in tasting of food"},{letter:"d",text:"all muscles of tongue supplied by same nerve"},{letter:"e",text:"none of the above"}], answer:"e" },
            { id:23, text:"tensor palati muscle", options:[{letter:"a",text:"inserted to Eustachian tube"},{letter:"b",text:"it is minor palatal muscle"},{letter:"c",text:"supplied by maxillary division of trigeminal nerve"},{letter:"d",text:"when contract open Eustachian tube"},{letter:"e",text:"a & b"}], answer:"d" },

            { id:25, text:"pharynx", options:[{letter:"a",text:"palatine tonsil diseases cause jugulo- omohyoid lymph nodes enlargement"},{letter:"b",text:"palatoglossus forms posterior end of palatine tonsils"},{letter:"c",text:"palatoglossus share in oropharyngeal isthmus"},{letter:"d",text:"b & c"},{letter:"e",text:"all of the above."}], answer:"c" },
            { id:26, text:"hypopharynx (choose false)", options:[{letter:"a",text:"C6 vertebra represents end of it"},{letter:"b",text:"aryepiglottic folds forms lateral boundary"},{letter:"c",text:"consists of pyriform fossae & postcricoid regions"},{letter:"d",text:"valleculae are not part from it"},{letter:"e",text:"none of the above."}], answer:"d" },
            { id:27, text:"superior constrictor muscle", options:[{letter:"a",text:"arise from pharyngeal tubercle of occipital bone"},{letter:"b",text:"by its contraction propel bolus of food superiorly"},{letter:"c",text:"innervated by mandibular division of trigeminal nerve"},{letter:"d",text:"inserted to pharyngeal raphe"},{letter:"e",text:"c & d"}], answer:"d" },
            { id:28, text:"salpingopharyngus muscle", options:[{letter:"a",text:"elevates of Eustachian tube"},{letter:"b",text:"share in breathing"},{letter:"c",text:"blends with palatopharyngus"},{letter:"d",text:"supplied by trigeminal nerve"},{letter:"e",text:"a & b."}], answer:"c" },
            { id:29, text:"A patient presents with visual field defects and endocrine dysfunction. Imaging shows a lesion in the sella turcica region. Which dural fold is most directly related?", options:[{letter:"a",text:"Falx cerebri"},{letter:"b",text:"Falx cerebelli"},{letter:"c",text:"Tentorium cerebelli"},{letter:"d",text:"Diaphragma sella"},{letter:"e",text:"Straight sinus."}], answer:"d" },
            { id:30, text:"Which of the following dural sinuses lies between the periosteal and meningeal layers of the dura mater?", options:[{letter:"a",text:"Inferior sagittal sinus"},{letter:"b",text:"Superior sagittal sinus"},{letter:"c",text:"Straight sinus"},{letter:"d",text:"Cavernous sinus"},{letter:"e",text:"Great cerebral vein"}], answer:"b" },
            { id:31, text:"A lumbar MRI reveals a thickened and inflamed denticulate ligament. From which meningeal layer does this ligament originate?", options:[{letter:"a",text:"Pia mater"},{letter:"b",text:"Arachnoid mater"},{letter:"c",text:"Dura mater"},{letter:"d",text:"Subarachnoid space"}], answer:"a" }
        ];

        window.addEventListener('load', function() {
            const { useState, useRef, useEffect } = React;
            
            // ---------- خلفية مع صورة حسب الاتجاه (أفقي B.jpg ، عمودي B2.jpg) وجزيئات وشهب ----------
            const GalaxyBackground = () => {
                const canvasRef = useRef(null);
                const [orientation, setOrientation] = useState(window.innerWidth > window.innerHeight ? 'landscape' : 'portrait');
                
                useEffect(() => {
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext("2d");
                    if (!ctx) return;
                    
                    let animationId;
                    let width = window.innerWidth;
                    let height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    
                    // الصور حسب الاتجاه
                    const imgLandscape = new Image();
                    imgLandscape.src = "B.jpg";
                    const imgPortrait = new Image();
                    imgPortrait.src = "B2.jpg";
                    
                    let currentImg = orientation === 'landscape' ? imgLandscape : imgPortrait;
                    
                    // جزيئات بيضاء
                    const PARTICLE_COUNT = 180;
                    let particles = [];
                    function initParticles(w, h) {
                        particles = Array.from({ length: PARTICLE_COUNT }, () => ({
                            x: Math.random() * w, y: Math.random() * h,
                            radius: Math.random() * 2 + 0.8,
                            alpha: Math.random() * 0.5 + 0.2,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.2 + 0.1,
                        }));
                    }
                    initParticles(width, height);
                    
                    // شهب
                    let shoots = [];
                    let shootTimer = 0;
                    function spawnShoot(w, h) {
                        const x = Math.random() * w;
                        const y = Math.random() * h * 0.4;
                        const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.6;
                        const speed = 6 + Math.random() * 7;
                        shoots.push({
                            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                            len: 70 + Math.random() * 50, alpha: 1, life: 1,
                        });
                    }
                    
                    function draw() {
                        if (!ctx) return;
                        ctx.clearRect(0, 0, width, height);
                        // رسم الصورة المناسبة
                        if (currentImg.complete && currentImg.naturalWidth > 0) {
                            ctx.drawImage(currentImg, 0, 0, width, height);
                        } else {
                            ctx.fillStyle = "#0a0a2a";
                            ctx.fillRect(0, 0, width, height);
                        }
                        // الجزيئات
                        for (let p of particles) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                            ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                            ctx.fill();
                            p.x += p.vx;
                            p.y += p.vy;
                            if (p.x < 0) p.x = width;
                            if (p.x > width) p.x = 0;
                            if (p.y < 0) p.y = height;
                            if (p.y > height) p.y = 0;
                        }
                        // شهب
                        shootTimer++;
                        if (shootTimer > 70) { spawnShoot(width, height); shootTimer = 0; }
                        for (let i=shoots.length-1; i>=0; i--) {
                            const s = shoots[i];
                            s.x += s.vx; s.y += s.vy;
                            s.life -= 0.022;
                            s.alpha = s.life;
                            if (s.life <= 0) { shoots.splice(i,1); continue; }
                            const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.vx*(s.len/10), s.y - s.vy*(s.len/10));
                            grad.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
                            grad.addColorStop(1, "rgba(255,255,255,0)");
                            ctx.beginPath();
                            ctx.moveTo(s.x, s.y);
                            ctx.lineTo(s.x - s.vx*(s.len/10), s.y - s.vy*(s.len/10));
                            ctx.strokeStyle = grad;
                            ctx.lineWidth = 2.5;
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(s.x, s.y, 2, 0, Math.PI*2);
                            ctx.fillStyle = `rgba(255,255,200,${s.alpha})`;
                            ctx.fill();
                        }
                        animationId = requestAnimationFrame(draw);
                    }
                    
                    const handleResize = () => {
                        width = window.innerWidth;
                        height = window.innerHeight;
                        canvas.width = width;
                        canvas.height = height;
                        initParticles(width, height);
                        const newOrientation = width > height ? 'landscape' : 'portrait';
                        if (newOrientation !== orientation) {
                            setOrientation(newOrientation);
                            currentImg = newOrientation === 'landscape' ? imgLandscape : imgPortrait;
                        }
                    };
                    
                    const onOrientationChange = () => {
                        const newOrientation = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
                        setOrientation(newOrientation);
                        currentImg = newOrientation === 'landscape' ? imgLandscape : imgPortrait;
                        handleResize();
                    };
                    
                    window.addEventListener('resize', onOrientationChange);
                    // تأكد من تحميل الصور
                    imgLandscape.onload = () => { if (orientation === 'landscape') draw(); };
                    imgPortrait.onload = () => { if (orientation === 'portrait') draw(); };
                    if (currentImg.complete) draw(); else draw(); // fallback
                    
                    return () => {
                        cancelAnimationFrame(animationId);
                        window.removeEventListener('resize', onOrientationChange);
                    };
                }, [orientation]);
                
                return React.createElement('canvas', { ref: canvasRef, className: "fixed inset-0 w-full h-full", style: { zIndex: 0, pointerEvents: "none", objectFit: "cover" } });
            };
            
            // ---------- Hero Screen مع إضافة تأثير النيون على الحواف والنص ----------
            const HeroScreen = ({ onStart }) => {
                return React.createElement('div', { className: "min-h-screen flex flex-col items-center justify-center px-4 snap-start relative" },
                    React.createElement('div', { className: "absolute inset-0 flex items-center justify-center pointer-events-none", style: { zIndex: 1 } },
                        React.createElement('div', { className: "w-96 h-96 rounded-full", style: { background: "radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%)", filter: "blur(40px)" } })
                    ),
                    React.createElement('div', { className: "relative flex flex-col items-center text-center p-6 rounded-3xl neon-card", style: { zIndex: 2, background: "rgba(10, 5, 30, 0.55)", backdropFilter: "blur(15px)", borderWidth: "1.5px" } },
                        React.createElement('div', { className: "mb-3 tracking-widest text-xs uppercase text-purple-400/60 font-medium", style: { letterSpacing: "0.35em" } }, "Interactive Quiz by"),
                        React.createElement('h1', { className: "mb-6 neon-text", style: { fontFamily: "'Dancing Script', 'Brush Script MT', cursive", fontSize: "clamp(3.5rem, 12vw, 7rem)", fontWeight: 700, background: "linear-gradient(135deg, #c084fc 0%, #818cf8 40%, #38bdf8 80%, #c084fc 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text", lineHeight: 1.15, letterSpacing: "-0.01em" } }, "al_witify"),
                        React.createElement('div', { className: "mb-2 text-lg md:text-xl font-light tracking-wide", style: { fontFamily: "'Dancing Script', cursive", color: "#a78bfa", textShadow: "0 0 20px rgba(167,139,250,0.5)" } }, "Head & Neck Anatomy Quiz"),
                        React.createElement('p', { className: "text-purple-300/60 text-sm mb-10 max-w-md leading-relaxed", style: { fontFamily: "'Inter', sans-serif" } }, "31 carefully crafted MCQs. Select an answer to reveal feedback instantly. Scroll between questions."),
                        React.createElement('div', { className: "flex gap-2 mb-10 text-yellow-400/60 text-lg" }, 
                            ["★","✦","★","✦","★"].map((s,i) => React.createElement('span', { key:i, style: { animation: `pulse 2s ease-in-out ${i*0.3}s infinite alternate`, display: "inline-block" } }, s))
                        ),
                        React.createElement('button', {
                            onClick: onStart,
                            className: "group relative overflow-hidden px-10 py-4 rounded-2xl font-semibold text-white text-base tracking-wide transition-all duration-300",
                            style: { background: "linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #0ea5e9 100%)", boxShadow: "0 0 30px rgba(124,58,237,0.5), 0 4px 24px rgba(0,0,0,0.4)", fontFamily: "'Inter', sans-serif" }
                        }, 
                            React.createElement('span', { className: "relative z-10 flex items-center gap-2" }, "🚀 Start Quiz"),
                            React.createElement('div', { className: "absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300", style: { background: "linear-gradient(135deg, #9333ea 0%, #6366f1 50%, #38bdf8 100%)" } })
                        ),
                        React.createElement('div', { className: "mt-6 flex gap-6 text-purple-300/50 text-xs", style: { fontFamily: "'Inter', sans-serif" } },
                            React.createElement('span', null, "📋 31 Questions"),
                            React.createElement('span', null, "🎵 Audio Feedback"),
                            React.createElement('span', null, "✨ Instant Results")
                        )
                    )
                );
            };
            
            // ---------- Question Card مع إضافة النيون على البطاقة + حواف النص (عن طريق النيون العام) ----------
            const QuestionCard = ({ question, index, total }) => {
                const [selected, setSelected] = useState(null);
                const [showResult, setShowResult] = useState(false);
                const isCorrect = selected === question.answer;
                
                const playSound = (type) => {
                    try {
                        const AudioCtx = window.AudioContext || window.webkitAudioContext;
                        const ctx = new AudioCtx();
                        if (type === "correct") {
                            const freqs = [523.25, 659.25, 783.99];
                            freqs.forEach((freq, i) => {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain); gain.connect(ctx.destination);
                                osc.type = "sine";
                                osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
                                gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.15);
                                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.45);
                                osc.start(ctx.currentTime + i * 0.15);
                                osc.stop(ctx.currentTime + i * 0.15 + 0.5);
                            });
                        } else {
                            const freqs = [311.13, 233.08];
                            freqs.forEach((freq, i) => {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain); gain.connect(ctx.destination);
                                osc.type = "sawtooth";

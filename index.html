                            grad.addColorStop(0, neb.color);
                            grad.addColorStop(1, "rgba(0,0,0,0)");
                            ctx.fillStyle = grad;
                            ctx.beginPath();
                            ctx.arc(neb.x, neb.y, neb.r, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        for (const star of stars) {

                            ctx.beginPath();
                            ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                            ctx.fill();
                        }

                        shootTimer++;
                        if (shootTimer > 90) { spawnShoot(); shootTimer = 0; }
                        for (let i = shoots.length - 1; i >= 0; i--) {
                            const s = shoots[i];
                            s.x += s.vx;
                            s.y += s.vy;
                            s.life -= 0.025;
                            s.alpha = s.life;
                            if (s.life <= 0) { shoots.splice(i, 1); continue; }
                            const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * (s.len / 10), s.y - s.vy * (s.len / 10));
                            grad.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
                            grad.addColorStop(1, "rgba(255,255,255,0)");
                            ctx.beginPath();
                            ctx.moveTo(s.x, s.y);
                            ctx.lineTo(s.x - s.vx * (s.len / 10), s.y - s.vy * (s.len / 10));
                            ctx.strokeStyle = grad;
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }

                        t++;
